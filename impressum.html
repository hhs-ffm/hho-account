<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Impressum - Helmholtz-Online</title>

  <style>
    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      text-align: center;
      background-color: #f6f6f2; 
      color: #3b3b3b;
      padding: 2rem 1rem;
      margin: 0;
    }
    .card {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      max-width: 420px;
      margin: auto;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      border-top: 5px solid #0071b3;
      text-align: left; /* Impressum liest sich linksbündig besser */
    }
    h2 {
      font-size: 1.3rem;
      margin-top: 0;
      color: #000;
      text-align: center;
    }
    h3 {
      font-size: 1.1rem;
      color: #0071b3;
      margin-bottom: 0.5rem;
    }
    p {
      line-height: 1.5;
      margin-top: 0;
    }
    a {
      color: #0071b3;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    button {
      display: block;
      width: 100%;
      margin: 1.5rem 0 0 0;
      padding: 0.9rem;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .secondary {
      background: #e6f0f9;
      color: #0071b3;
    }
    .secondary:hover {
      background: #d4e5f4;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Impressum</h2>

  <p>Angaben gemäß § 5 TMG / § 18 MStV:</p>

  <h3>Herausgeber</h3>
  <p><strong>Private Elterninitiative</strong><br>
  (Nicht-kommerzielles Informationsangebot)</p>

  <h3>Verantwortlich für den Inhalt</h3>
  <p>
    Jörg Ott<br>
    Waldschmidtstr. 7<br>
    60316 Frankfurt am Main<br>
    Hessen
  </p>

  <h3>Kontakt</h3>
  <p>
    E-Mail: <a href="mailto:helmholtzonline@gmx.info">helmholtzonline@gmx.info</a>
  </p>

  <button class="secondary" onclick="window.history.back()">
    Zurück
  </button>
</div>

</body>
</html>
