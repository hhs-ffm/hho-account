<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Helmholtz-Online Login</title>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const email = urlParams.get('e');
    
    if (email) {
      // The Workspace Trick: Force the destination to the school's specific Google Workspace environment
      const workspaceUrl = "https://mail.google.com/a/helmholtzschule-ffm.net/";
      
      // Pass the workspace destination into the continue parameter, along with the email hints
      const loginUrl = "https://accounts.google.com/ServiceLogin?continue=" + encodeURIComponent(workspaceUrl) + "&login_hint=" + encodeURIComponent(email) + "&Email=" + encodeURIComponent(email);
      
      window.location.replace(loginUrl);
    } else {
      window.location.replace("http://mail.helmholtzschule-ffm.net");
    }
  </script>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; margin-top: 50px;">
  <p>Sie werden zum Login weitergeleitet...</p>
</body>
</html>
